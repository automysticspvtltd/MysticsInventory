  /einvoice/bulk:
    post:
      operationId: startBulkEinvoice
      tags: [einvoice]
      summary: Register IRNs for a batch of sales orders in the background
      description: >-
        Starts a background job that registers IRNs for every order in
        `orderIds`. Each order is pre-classified (eligible / already
        issued / ineligible) and the result is reported in the
        `results` array — the worker mutates each row in-place as it
        advances. Idempotent: re-running with the same orderIds skips
        orders that already carry an active IRN.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkEinvoiceRequest" }
      responses:
        "202":
          description: Batch accepted; poll the GET endpoint for live status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkEinvoiceBatch" }
        "400":
          description: Validation error or e-invoicing not connected/enabled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /einvoice/bulk/{batchId}:
    get:
      operationId: getBulkEinvoiceBatch
      tags: [einvoice]
      parameters:
        - { in: path, name: batchId, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkEinvoiceBatch" }
        "404":
          description: Batch not found or expired.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

