      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockTransferDetail" }

  /job-work-orders:
    get:
      operationId: listJobWorkOrders
      tags: [jobWork]
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
        - in: query
          name: supplierId
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/JobWorkOrder" }
    post:
      operationId: createJobWorkOrder
      tags: [jobWork]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateJobWorkOrderPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobWorkOrderDetail" }

  /job-work-orders/{id}:
    get:
      operationId: getJobWorkOrder
      tags: [jobWork]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobWorkOrderDetail" }
    patch:
      operationId: updateJobWorkOrder
      tags: [jobWork]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateJobWorkOrderPayload" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobWorkOrderDetail" }

  /job-work-orders/{id}/cancel:
    post:
      operationId: cancelJobWorkOrder
      tags: [jobWork]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobWorkOrderDetail" }

  /job-work-orders/{id}/issue:
    post:
      operationId: issueJobWorkMaterial
      tags: [jobWork]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IssueJobWorkMaterialPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobWorkOrderDetail" }

  /job-work-orders/{id}/receive:
    post:
      operationId: receiveJobWorkOutput
      tags: [jobWork]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReceiveJobWorkOutputPayload" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobWorkOrderDetail" }

  /job-work-orders/{id}/receipts/{receiptId}/cancel:
    post:
      operationId: cancelJobWorkReceipt
      tags: [jobWork]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - { in: path, name: receiptId, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobWorkOrderDetail" }

  /job-work-orders/{id}/issues/{issueId}/challan.pdf:
    get:
      operationId: downloadJobWorkChallan
      tags: [jobWork]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - { in: path, name: issueId, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Delivery challan PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /reports/stock-with-job-workers:
    get:
      operationId: reportStockWithJobWorkers
      tags: [reports]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockWithJobWorkersReport" }

  /reports/pending-job-work:
    get:
      operationId: reportPendingJobWork
      tags: [reports]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PendingJobWorkReport" }

  /items/{id}/barcode.png:
    get:
      operationId: downloadItemBarcodePng
      tags: [items]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
        - { in: query, name: scale, required: false, schema: { type: integer } }
        - { in: query, name: height, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Code128 barcode PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary

  /items/barcode-labels.pdf:
    get:
      operationId: downloadItemBarcodeLabelsPdf
      tags: [items]
      parameters:
        - in: query
          name: ids
          required: true
          schema: { type: string }
          description: Comma-separated item ids (max 200).
        - in: query
          name: copies
          required: false
          schema: { type: integer }
          description: Copies per item (1-50, default 1).
      responses:
        "200":
          description: Multi-up A4 label sheet PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /items/{id}/barcode/regenerate:
    post:
      operationId: regenerateItemBarcode
      tags: [items]
      summary: Regenerate the auto-barcode for a single item
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Updated item with the new auto-generated barcode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "404":
          description: Item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /items/barcodes/assign-missing:
    post:
      operationId: assignMissingItemBarcodes
      tags: [items]
      summary: Auto-generate barcodes for every active item that doesn't have one yet
      responses:
        "200":
          description: Assignment summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssignMissingBarcodesResult" }

  /organizations/current/barcode-settings:
    patch:
      operationId: updateOrganizationBarcodeSettings
      tags: [organizations]
      summary: Update per-org barcode auto-generation prefix and format
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateBarcodeSettingsBody" }
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /pos/items/lookup:
    get:
      operationId: lookupPosItems
      tags: [pos]
      parameters:
        - { in: query, name: q, required: false, schema: { type: string } }
        - { in: query, name: warehouseId, required: false, schema: { type: integer } }
        - { in: query, name: limit, required: false, schema: { type: integer } }
        - { in: query, name: saleChannel, required: false, schema: { type: string }, description: "Resolve the warehouse from this channel's default before falling back to the org default." }
        - { in: query, name: bags, required: false, schema: { type: string }, description: "Set to '1' to return only bag items (isBag=true); q is not required when bags=1." }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosLookupResult" }

  /pos/checkout:
    post:
      operationId: posCheckout
      tags: [pos]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PosCheckoutBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosCheckoutResult" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Error:
      type: object
      properties:
        error: { type: string }
        code: { type: string }
      required: [error]

    Ok:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    AuthAck:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string }
      required: [ok, message]

    AuthSession:
      type: object
      properties:
        ok: { type: boolean }
        user:
          oneOf:
            - { $ref: "#/components/schemas/User" }
            - type: "null"

    SignupBody:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
        name: { type: ["string", "null"] }
      required: [email, password]

    LoginBody:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    TokenBody:
      type: object
      properties:
        token: { type: string }
      required: [token]

    EmailBody:
      type: object
      properties:
        email: { type: string }
      required: [email]

    ResetPasswordBody:
      type: object
      properties:
        token: { type: string }
        password: { type: string }
      required: [token, password]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]

    EmailSettings:
      type: object
      properties:
        id: { type: integer }
        host: { type: string }
        port: { type: integer }
        secure: { type: string, enum: [ssl, starttls, none] }
        username: { type: string }
        fromEmail: { type: string }
        fromName: { type: ["string", "null"] }
        hasPassword: { type: boolean }
        updatedAt: { type: string }
      required: [id, host, port, secure, username, fromEmail, fromName, hasPassword, updatedAt]

    EmailSettingsBody:
      type: object
      properties:
        host: { type: string }
        port: { type: integer }
        secure: { type: string, enum: [ssl, starttls, none] }
        username: { type: string }
        password: { type: string }
        fromEmail: { type: string }
        fromName: { type: ["string", "null"] }
      required: [host, port, secure, username, fromEmail]

    User:
      type: object
      properties:
        id: { type: integer }
        emailVerified: { type: boolean }
        email: { type: string }
        name: { type: ["string", "null"] }
        isSuperAdmin: { type: boolean }
      required: [id, email, name, isSuperAdmin, emailVerified]

    AdminOrganizationSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        plan: { type: string }
        subscriptionStatus: { type: string }
        currency: { type: string }
        gstNumber: { type: ["string", "null"] }
        createdAt: { type: string }
        trialEndsAt: { type: ["string", "null"] }
        memberCount: { type: integer }
        itemCount: { type: integer }
        salesOrderCount: { type: integer }
      required:
        [
          id,
          name,
          slug,
          plan,
          subscriptionStatus,
          currency,
          gstNumber,
          createdAt,
          trialEndsAt,
          memberCount,
          itemCount,
          salesOrderCount,
        ]

    AdminPlatformStats:
      type: object
      properties:
        organizationCount: { type: integer }
        userCount: { type: integer }
        salesOrderCount: { type: integer }
      required: [organizationCount, userCount, salesOrderCount]

    Organization:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        currency: { type: string }
        timezone: { type: string }
        gstNumber: { type: ["string", "null"] }
        addressLine1: { type: ["string", "null"] }
        addressLine2: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        postalCode: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        logoUrl: { type: ["string", "null"] }
        invoiceFooter: { type: ["string", "null"] }
        plan: { type: string }
        subscriptionStatus: { type: string }
        currentPeriodEnd: { type: ["string", "null"] }
        onboardingCompletedAt: { type: ["string", "null"] }
        barcodePrefix:
          type: ["string", "null"]
          description: Per-org prefix prepended to every auto-generated barcode. When null/empty, the generator falls back to a slug-derived default.
        barcodeFormat:
          type: string
          description: Active barcode format. Currently locked to "code128"; the column exists so EAN-13 / UPC-A can be added later without a migration.
        createdAt: { type: string }
      required: [id, name, slug, currency, timezone, plan, subscriptionStatus, createdAt, gstNumber, addressLine1, addressLine2, city, state, postalCode, country, logoUrl, invoiceFooter, currentPeriodEnd, onboardingCompletedAt, barcodePrefix, barcodeFormat]

    UpdateBarcodeSettingsBody:
      type: object
      properties:
        barcodePrefix:
          type: ["string", "null"]
          description: 1-8 alphanumeric characters. Pass null or empty string to fall back to the slug-derived default.
        barcodeFormat:
          type: string
          enum: [code128]
          description: Currently locked to code128.

    AssignMissingBarcodesResult:
      type: object
      properties:
        candidates: { type: integer, description: Items considered (active, no barcode). }
        assigned: { type: integer, description: Items that received a fresh auto-barcode. }
        failed: { type: integer, description: Items the generator could not assign after retries. }
      required: [candidates, assigned, failed]

    UpdateOrganizationBody:
      type: object
      properties:
        name: { type: string }
        currency: { type: string }
        timezone: { type: string }
        gstNumber: { type: ["string", "null"] }
        addressLine1: { type: ["string", "null"] }
        addressLine2: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        postalCode: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        logoUrl: { type: ["string", "null"] }
        invoiceFooter: { type: ["string", "null"] }

    MeResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/User" }
        organization: { $ref: "#/components/schemas/Organization" }
        role: { type: string }
        canEditBills: { type: boolean }
        canEditStocks: { type: boolean }
      required: [user, organization, role, canEditBills, canEditStocks]

    Warehouse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        addressLine1: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        isDefault: { type: boolean }
        isVirtual: { type: boolean }
        jobWorkerSupplierId: { type: ["integer", "null"] }
        shopifyLocationId: { type: ["string", "null"] }
        shopifyLocationName: { type: ["string", "null"] }
        createdAt: { type: string }
      required:
        [
          id,
          name,
          code,
          isDefault,
          isVirtual,
          jobWorkerSupplierId,
          createdAt,
          addressLine1,
          city,
          state,
          country,
          shopifyLocationId,
          shopifyLocationName,
        ]

    CreateWarehousePayload:
      type: object
      properties:
        name: { type: string }
        code: { type: string }
        addressLine1: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        isDefault: { type: boolean }
      required: [name, code]

    UpdateWarehousePayload:
      type: object
      properties:
        name: { type: string }
        code: { type: string }
        addressLine1: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        isDefault: { type: boolean }
        shopifyLocationId: { type: ["string", "null"] }

    VariantOptions:
      type: object
      additionalProperties: true
      description: |
        Variant option metadata. On parent items it stores the axis definition
        as { axes: ["Size", "Color"] }. On variant items it stores the chosen
        axis values as { Size: "M", Color: "Red" }.

    Item:
      type: object
      properties:
        id: { type: integer }
        sku: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        unit: { type: string }
        salePrice: { type: number }
        purchasePrice: { type: number }
        hsnCode: { type: ["string", "null"] }
        barcode:
          type: ["string", "null"]
          description: Optional scannable barcode separate from SKU. The camera scanner matches `barcode` first, falling back to `sku`.
        barcodeSource:
          type: ["string", "null"]
          enum: [auto, manual, null]
          description: How the current barcode was assigned — `auto` for the per-org auto-generator, `manual` for user-typed/scanned/imported values, `null` when no barcode is set.
        taxRate: { type: number }
        reorderLevel: { type: number }
        totalStock: { type: number }
        stockAtWarehouse:
          type: ["number", "null"]
          description: On-hand stock at the warehouse passed via the warehouseId query param. Null when warehouseId is not supplied.
        warehouseStock:
          type: ["array", "null"]
          items: { $ref: "#/components/schemas/ItemWarehouseStock" }
          description: Per-warehouse on-hand breakdown for this item, populated only when the list endpoint is called with `includeWarehouseBreakdown=true`. Excludes virtual job-worker warehouses. Null otherwise.
        imageUrl: { type: ["string", "null"] }
        parentItemId:
          type: ["integer", "null"]
          description: When set, this item is a variant of the referenced parent item.
        hasVariants:
          type: boolean
          description: True when this item is a parent that holds variants. Parents cannot appear on order/transfer/adjust lines.
        variantOptions:
          oneOf:
            - { $ref: "#/components/schemas/VariantOptions" }
            - { type: "null" }
        variantCount:
          type: integer
          description: Number of variant children. Always 0 for non-parent items.
        isBundle:
          type: boolean
          description: True when this item is a bundle whose stock is derived from its components. Bundles cannot appear on purchase orders, transfers, or stock adjustments.
        isBag:
          type: boolean
          description: True when this item is a packaging bag/carry-bag. POS surfaces a quick-pick for bags; otherwise behaves as a normal stocked item.
        allowBackorder:
          type: boolean
          description: When true, POS and shipments may sell this item even with insufficient on-hand stock (backorder). Defaults to false.
        trackBatches:
          type: boolean
          description: True when this item tracks individual production batches with manufacturing and expiry dates. Stock-in must capture batch metadata; stock-out must pick from existing batches. Cannot be enabled on a variant parent or a bundle.
        createdAt: { type: string }
        maxDiscountPercent: { type: ["number", "null"] }
        maxDiscountAmount: { type: ["number", "null"] }
      required:
        [
          id,
          sku,
          name,
          unit,
          salePrice,
          purchasePrice,
          taxRate,
          reorderLevel,
          totalStock,
          stockAtWarehouse,
          warehouseStock,
          createdAt,
          description,
          category,
          hsnCode,
          barcode,
          imageUrl,
          parentItemId,
          hasVariants,
          variantOptions,
          variantCount,
          isBundle,
          trackBatches,
          barcodeSource,
        ]

    ItemWarehouseStock:
      type: object
      properties:
        warehouseId: { type: integer }
        warehouseName: { type: string }
        quantity: { type: number }
      required: [warehouseId, warehouseName, quantity]

    VariantStock:
      type: object
      properties:
        item: { $ref: "#/components/schemas/Item" }
        stockByWarehouse:
          type: array
          items: { $ref: "#/components/schemas/ItemWarehouseStock" }
      required: [item, stockByWarehouse]

    BundleComponent:
      type: object
      properties:
        id: { type: integer }
        componentItemId: { type: integer }
        componentSku: { type: string }
        componentName: { type: string }
        quantityPerBundle: { type: number }
      required:
        [id, componentItemId, componentSku, componentName, quantityPerBundle]

    ItemDetail:
      type: object
      properties:
        item: { $ref: "#/components/schemas/Item" }
        stockByWarehouse:
          type: array
          items: { $ref: "#/components/schemas/ItemWarehouseStock" }
          description: For a bundle, the per-warehouse derived (assemblable) quantity rather than a stored stock row.
        variants:
          type: array
          items: { $ref: "#/components/schemas/VariantStock" }
          description: Children of this item when it is a parent. Empty for leaf items.
        components:
          type: array
          items: { $ref: "#/components/schemas/BundleComponent" }
          description: Components of this item when it is a bundle. Empty otherwise.
      required: [item, stockByWarehouse, variants, components]

    CreateItemPayload:
      type: object
      properties:
        sku: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        unit: { type: string }
        salePrice: { type: number }
        purchasePrice: { type: number }
        hsnCode: { type: ["string", "null"] }
        barcode:
          type: ["string", "null"]
          description: Optional scannable barcode separate from SKU. Up to 64 characters.
        taxRate: { type: number }
        reorderLevel: { type: number }
        imageUrl: { type: ["string", "null"] }
        openingStock: { type: number }
        openingWarehouseId: { type: ["integer", "null"] }
        hasVariants:
          type: boolean
          description: When true, the new item is a parent with axes defined in `variantOptions`. Opening stock is ignored for parents.
        variantOptions:
          oneOf:
            - { $ref: "#/components/schemas/VariantOptions" }
            - { type: "null" }
        isBundle:
          type: boolean
          description: When true, the new item is a bundle. Components must be supplied and `openingStock` is rejected. Cannot be combined with `hasVariants=true`.
        isBag:
          type: boolean
          description: When true, the new item is marked as a packaging bag for POS quick-pick. Defaults to false.
        allowBackorder:
          type: boolean
          description: When true, POS and shipments may sell this item even with insufficient on-hand stock. Defaults to false.
        components:
          type: array
          description: Required when `isBundle` is true. Each entry pairs a component item id with the quantity consumed per bundle.
          items:
            $ref: "#/components/schemas/BundleComponentInput"
        trackBatches:
          type: boolean
          description: When true, the new item tracks production batches. Cannot be combined with `hasVariants=true` or `isBundle=true`. Defaults to false.
      required: [sku, name, unit, salePrice, purchasePrice, taxRate, reorderLevel]

    UpdateItemPayload:
      type: object
      properties:
        sku: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        unit: { type: string }
        salePrice: { type: number }
        purchasePrice: { type: number }
        hsnCode: { type: ["string", "null"] }
        barcode:
          type: ["string", "null"]
          description: Optional scannable barcode separate from SKU. Send null to clear.
        taxRate: { type: number }
        reorderLevel: { type: number }
        imageUrl: { type: ["string", "null"] }
        hasVariants:
          type: boolean
          description: "Toggle whether this item is a variant parent. Setting from false to true requires variantOptions in the same payload and the item must not itself be a variant. Setting from true to false is rejected if any child variants still exist."
        variantOptions:
          oneOf:
            - { $ref: "#/components/schemas/VariantOptions" }
            - { type: "null" }
        isBundle:
          type: boolean
          description: "Toggle whether this item is a bundle. Sending a `components` array replaces the previous component list."
        isBag:
          type: boolean
          description: "Toggle whether this item is marked as a packaging bag for POS quick-pick."
        allowBackorder:
          type: boolean
          description: "Toggle whether POS/shipments may sell this item with insufficient stock."
        components:
          type: array
          items:
            $ref: "#/components/schemas/BundleComponentInput"
        trackBatches:
          type: boolean
          description: "Toggle batch tracking. Off→on always allowed (provided the item is not a parent or a bundle). On→off only when no batches have been recorded for the item."

    BundleComponentInput:
      type: object
      properties:
        componentItemId: { type: integer }
        quantityPerBundle: { type: number }
      required: [componentItemId, quantityPerBundle]

    BulkImportItemRow:
      type: object
      description: One CSV-like row in a bulk-import payload. Numeric fields accept either numbers or numeric strings; empty strings map to defaults.
      properties:
        sku: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        unit: { type: ["string", "null"] }
        salePrice: { type: ["number", "string", "null"] }
        purchasePrice: { type: ["number", "string", "null"] }
        hsnCode: { type: ["string", "null"] }
        barcode:
          type: ["string", "null"]
          description: Optional scannable barcode separate from SKU. Up to 64 characters. Empty values are ignored on upsert.
        taxRate: { type: ["number", "string", "null"] }
        reorderLevel: { type: ["number", "string", "null"] }
        totalStock:
          type: ["number", "string", "null"]
          description: "When provided, sets opening stock in the org's primary warehouse. For upsert mode, applies the delta to reach this total. Ignored for bundles, variants, and batch-tracked items."
        imageUrl:
          type: ["string", "null"]
          description: "URL of the item's product image."
        maxDiscountPercent:
          type: ["number", "string", "null"]
          description: "Max discount % cap (0–100). Null means no cap."
        maxDiscountAmount:
          type: ["number", "string", "null"]
          description: "Max flat discount cap in rupees. Null means no cap."
      required: [sku, name]

    BulkImportItemsPayload:
      type: object
      properties:
        mode:
          type: string
          enum: [create, upsert]
          description: "`create` rejects rows whose sku already exists. `upsert` updates existing simple items in place; complex items (variants, bundles, batch-tracked) are still rejected."
        dryRun:
          type: boolean
          description: When true, validate and report row-level results without committing.
        rows:
          type: array
          minItems: 1
          maxItems: 1000
          items: { $ref: "#/components/schemas/BulkImportItemRow" }
      required: [mode, rows]

    BulkImportResultRow:
      type: object
      properties:
        index:
          type: integer
          description: 1-based position of the row in the submitted payload.
        sku: { type: string }
        action:
          type: string
          enum: [create, update, error]
        error: { type: ["string", "null"] }
      required: [index, sku, action]

    BulkImportItemsResponse:
      type: object
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/BulkImportResultRow" }
        counts:
          type: object
          properties:
            create: { type: integer }
            update: { type: integer }
            error: { type: integer }
          required: [create, update, error]
      required: [results, counts]

    BulkEditItemsPayload:
      type: object
      properties:
        ids:
          type: array
          items: { type: integer }
          minItems: 1
          maxItems: 500
          description: IDs of the items to update. All must belong to the caller's organization.
        category:
          type: ["string", "null"]
          description: New category value. Pass null to clear.
        taxRate:
          type: number
          description: GST rate (0–100). Applied to every item in the list.
        salePrice:
          type: number
          description: New selling price (₹). Applied to every item in the list.
        reorderLevel:
          type: number
          description: New minimum stock level. Applied to every item in the list.
        status:
          type: string
          enum: [active, inactive]
          description: "active → clear archivedAt; inactive → set archivedAt to now (archive the item)."
      required: [ids]

