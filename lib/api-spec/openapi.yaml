        componentItemSku: { type: string }
        quantity: { type: number }
      required: [id, componentItemId, componentItemName, componentItemSku, quantity]

    JobWorkIssue:
      type: object
      properties:
        id: { type: integer }
        issueNumber: { type: string }
        issueDate: { type: string }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        lines:
          type: array
          items: { $ref: "#/components/schemas/JobWorkIssueLine" }
      required: [id, issueNumber, issueDate, notes, createdAt, lines]

    JobWorkReceiptComponent:
      type: object
      properties:
        id: { type: integer }
        componentItemId: { type: integer }
        componentItemName: { type: string }
        componentItemSku: { type: string }
        quantityConsumed: { type: number }
        scrapQuantity:
          type: number
          description: Per-component raw material wastage at the worker; recorded as a write-off and deducted from vendor warehouse alongside quantityConsumed.
      required:
        [
          id,
          componentItemId,
          componentItemName,
          componentItemSku,
          quantityConsumed,
          scrapQuantity,
        ]

    JobWorkReceipt:
      type: object
      properties:
        id: { type: integer }
        receiptNumber: { type: string }
        receivedDate: { type: string }
        finishedQuantity: { type: number }
        scrapQuantity: { type: number }
        jobCharge: { type: number }
        notes: { type: ["string", "null"] }
        status: { type: string }
        purchaseOrderId: { type: ["integer", "null"] }
        purchaseOrderNumber: { type: ["string", "null"] }
        createdAt: { type: string }
        components:
          type: array
          items: { $ref: "#/components/schemas/JobWorkReceiptComponent" }
      required:
        [
          id,
          receiptNumber,
          receivedDate,
          finishedQuantity,
          scrapQuantity,
          jobCharge,
          notes,
          status,
          purchaseOrderId,
          purchaseOrderNumber,
          createdAt,
          components,
        ]

    JobWorkOrderTotals:
      type: object
      properties:
        orderedQuantity: { type: number }
        receivedQuantity: { type: number }
        scrappedQuantity: { type: number }
        remainingQuantity: { type: number }
        totalCharges: { type: number }
      required: [orderedQuantity, receivedQuantity, scrappedQuantity, remainingQuantity, totalCharges]

    JobWorkOrderDetail:
      type: object
      properties:
        order: { $ref: "#/components/schemas/JobWorkOrder" }
        components:
          type: array
          items: { $ref: "#/components/schemas/JobWorkOrderComponent" }
        issues:
          type: array
          items: { $ref: "#/components/schemas/JobWorkIssue" }
        receipts:
          type: array
          items: { $ref: "#/components/schemas/JobWorkReceipt" }
        totals: { $ref: "#/components/schemas/JobWorkOrderTotals" }
      required: [order, components, issues, receipts, totals]

    CreateJobWorkOrderComponentPayload:
      type: object
      properties:
        componentItemId: { type: integer }
        quantityPerOutput: { type: number }
      required: [componentItemId, quantityPerOutput]

    CreateJobWorkOrderPayload:
      type: object
      properties:
        supplierId: { type: integer }
        outputItemId: { type: integer }
        outputQuantity: { type: number }
        sourceWarehouseId: { type: integer }
        destWarehouseId: { type: integer }
        jobChargeRate: { type: ["number", "null"] }
        expectedReturnDate: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        components:
          type: array
          items: { $ref: "#/components/schemas/CreateJobWorkOrderComponentPayload" }
          description: When omitted, the BOM is copied from the output item's bundle definition.
      required: [supplierId, outputItemId, outputQuantity, sourceWarehouseId, destWarehouseId]

    UpdateJobWorkOrderPayload:
      type: object
      description: |
        Patch a job-work order. Full edits (outputQuantity, components)
        are accepted only while the order is in draft. Once it is open
        (issued or partially_received), only jobChargeRate,
        expectedReturnDate and notes may be sent —
        completed/cancelled orders cannot be edited at all. Existing
        receipts and their auto-generated bills keep their original
        per-unit charge; only future receipts pick up the new rate.
      properties:
        outputQuantity: { type: number }
        jobChargeRate: { type: number }
        expectedReturnDate: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        components:
          type: array
          items: { $ref: "#/components/schemas/CreateJobWorkOrderComponentPayload" }

    IssueJobWorkLinePayload:
      type: object
      properties:
        componentItemId: { type: integer }
        quantity: { type: number }
      required: [componentItemId, quantity]

    IssueJobWorkMaterialPayload:
      type: object
      properties:
        issueDate: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        lines:
          type: array
          items: { $ref: "#/components/schemas/IssueJobWorkLinePayload" }
      required: [lines]

    ReceiveJobWorkComponentPayload:
      type: object
      properties:
        componentItemId: { type: integer }
        quantityConsumed: { type: number }
        scrapQuantity:
          type: ["number", "null"]
          default: 0
          description: Per-component raw material wastage at the worker. Defaults to 0. Deducted from the vendor warehouse alongside quantityConsumed and recorded as a separate job_work_scrap movement.
      required: [componentItemId, quantityConsumed]

    ReceiveJobWorkOutputPayload:
      type: object
      properties:
        receivedDate: { type: ["string", "null"] }
        finishedQuantity: { type: number }
        scrapQuantity: { type: ["number", "null"] }
        jobCharge:
          type: ["number", "null"]
          description: Defaults to outputQuantity * the order's jobChargeRate.
        notes: { type: ["string", "null"] }
        components:
          type: array
          items: { $ref: "#/components/schemas/ReceiveJobWorkComponentPayload" }
          description: When a component is omitted, it defaults to the BOM-implied amount.
      required: [finishedQuantity]

    StockWithJobWorkersReportRow:
      type: object
      properties:
        supplierId: { type: integer }
        supplierName: { type: string }
        warehouseId: { type: integer }
        warehouseName: { type: string }
        itemId: { type: integer }
        itemName: { type: string }
        sku: { type: string }
        quantity: { type: number }
      required: [supplierId, supplierName, warehouseId, warehouseName, itemId, itemName, sku, quantity]

    StockWithJobWorkersReport:
      type: object
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/StockWithJobWorkersReportRow" }
      required: [rows]

    PendingJobWorkReportRow:
      type: object
      properties:
        jobWorkOrderId: { type: integer }
        jwoNumber: { type: string }
        supplierId: { type: integer }
        supplierName: { type: string }
        outputItemId: { type: integer }
        outputItemName: { type: string }
        outputItemSku: { type: string }
        orderedQuantity: { type: number }
        receivedQuantity: { type: number }
        scrappedQuantity: { type: number }
        remainingQuantity: { type: number }
        componentsAtVendorTotal:
          type: number
          description: Total component units still physically at the worker (sum of issued lines minus consumed and scrapped on receipts) for this JWO. Useful as a "what is still owed back" gauge.
        expectedReturnDate: { type: ["string", "null"] }
        status: { type: string }
      required:
        [
          jobWorkOrderId,
          jwoNumber,
          supplierId,
          supplierName,
          outputItemId,
          outputItemName,
          outputItemSku,
          orderedQuantity,
          receivedQuantity,
          scrappedQuantity,
          remainingQuantity,
          componentsAtVendorTotal,
          expectedReturnDate,
          status,
        ]

    PendingJobWorkReport:
      type: object
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/PendingJobWorkReportRow" }
      required: [rows]

    PosLookupItem:
      type: object
      properties:
        id: { type: integer }
        sku: { type: string }
        name: { type: string }
        barcode: { type: ["string", "null"] }
        salePrice: { type: string }
        taxRate: { type: string }
        unit: { type: string }
        imageUrl: { type: ["string", "null"] }
        isBundle: { type: boolean }
        isBag: { type: boolean }
        trackBatches: { type: boolean }
        onHand: { type: number }
        maxDiscountPercent: { type: ["number", "null"] }
      required:
        [
          id,
          sku,
          name,
          barcode,
          salePrice,
          taxRate,
          unit,
          imageUrl,
          isBundle,
          isBag,
          trackBatches,
          onHand,
          maxDiscountPercent,
        ]

    PosLookupResult:
      type: object
      properties:
        warehouseId: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/PosLookupItem" }
      required: [warehouseId, items]

    PosCheckoutLine:
      type: object
      properties:
        itemId: { type: integer }
        quantity: { type: number }
        unitPrice: { type: number }
        taxRate: { type: number }
        discountPercent:
          type: number
          minimum: 0
          maximum: 100
          description: Per-line discount percent (0-100). Applied before tax. If set together with discountAmount, percent wins.
        discountAmount:
          type: number
          minimum: 0
          description: Per-line flat discount in rupees. Ignored when discountPercent is set.
        description: { type: ["string", "null"] }
      required: [itemId, quantity]

    PosCheckoutPayment:
      type: object
      properties:
        mode:
          type: string
          enum: [cash, card, upi, bank, other]
        amount: { type: number }
        referenceNumber: { type: ["string", "null"] }
        bankAccountLabel: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
      required: [mode, amount]

    PosCheckoutBody:
      type: object
      properties:
        lines:
          type: array
          items: { $ref: "#/components/schemas/PosCheckoutLine" }
        customerId: { type: ["integer", "null"] }
        warehouseId: { type: ["integer", "null"] }
        payment:
          allOf:
            - { $ref: "#/components/schemas/PosCheckoutPayment" }
          description: Single payment (backward compatible). Ignored when payments array is provided.
        payments:
          type: array
          items: { $ref: "#/components/schemas/PosCheckoutPayment" }
          description: Split payment entries. When provided, replaces the single payment field.
        notes: { type: ["string", "null"] }
        customerName: { type: string, minLength: 1 }
        customerPhone: { type: string, minLength: 1 }
        saleChannel:
          type: ["string", "null"]
          enum: [walkin, website, store, whatsapp, phone, instagram, other, null]
          description: Mode of sale captured at the POS — used for channel-level reporting.
        orderDiscountAmount: { type: ["number", "null"] }
      required: [lines, customerName, customerPhone]

    PosCheckoutResult:
      type: object
      properties:
        salesOrderId: { type: integer }
        orderNumber: { type: string }
        customerId: { type: integer }
        warehouseId: { type: integer }
        customerPaymentId: { type: integer }
        receiptUrl: { type: string }
        subtotal: { type: string }
        taxTotal: { type: string }
        total: { type: string }
      required:
        [
          salesOrderId,
          orderNumber,
          customerId,
          warehouseId,
          customerPaymentId,
          receiptUrl,
          subtotal,
          taxTotal,
          total,
        ]
